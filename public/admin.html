<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IWAKY — Administración</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#08081a;color:#e0e0f0;min-height:100vh;padding:32px}
.container{max-width:800px;margin:0 auto}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:32px}
.header h1{font-size:22px;font-family:'Playfair Display',serif}
.header a{color:#58a6ff;font-size:12px;text-decoration:none}
.card{background:linear-gradient(135deg,#0d0d18,#12122a);border:1px solid #1f1f35;border-radius:14px;padding:24px;margin-bottom:20px}
.card h2{font-size:16px;font-family:'Playfair Display',serif;margin-bottom:16px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:10px 12px;color:#6a6a7a;font-weight:500;border-bottom:1px solid #1f1f35}
td{padding:10px 12px;border-bottom:1px solid #0f0f22;color:#a0a0b0}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;text-transform:uppercase}
.badge-admin{background:#4f46e520;color:#818cf8;border:1px solid #4f46e540}
.badge-editor{background:#10b98120;color:#34d399;border:1px solid #10b98140}
.badge-viewer{background:#f59e0b20;color:#fbbf24;border:1px solid #f59e0b40}
.badge-inactive{background:#ef444420;color:#f87171;border:1px solid #ef444440}
.btn{padding:6px 14px;border:none;border-radius:6px;font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500;transition:opacity .2s}
.btn:hover{opacity:.85}
.btn-blue{background:#4f46e5;color:#fff}
.btn-red{background:#dc2626;color:#fff}
.btn-green{background:#059669;color:#fff}
.btn-sm{padding:4px 10px;font-size:10px}
.form-row{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.form-row input,.form-row select{flex:1;min-width:120px;padding:8px 12px;background:#1c2333;border:1px solid #2a2a45;border-radius:6px;color:#e0e0f0;font-family:'DM Sans',sans-serif;font-size:12px;outline:none}
.form-row input:focus,.form-row select:focus{border-color:#4f46e5}
.msg{padding:10px 14px;border-radius:8px;font-size:12px;margin-bottom:12px;display:none}
.msg.show{display:block}
.msg-ok{background:#0a1a10;border:1px solid #10b98140;color:#34d399}
.msg-err{background:#1a1015;border:1px solid #ef444440;color:#f87171}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Administración de Usuarios</h1>
    <div><a href="/">← Volver al Panel</a></div>
  </div>

  <div id="msg" class="msg"></div>

  <div class="card">
    <h2>Crear Nuevo Usuario</h2>
    <div class="form-row">
      <input type="text" id="newUser" placeholder="Usuario (login)">
      <input type="text" id="newName" placeholder="Nombre completo">
      <input type="password" id="newPass" placeholder="Contraseña (mín. 6)">
      <select id="newRole"><option value="editor">Editor</option><option value="viewer">Solo lectura</option><option value="admin">Admin</option></select>
      <button class="btn btn-blue" onclick="createUser()">+ Crear</button>
    </div>
  </div>

  <div class="card">
    <h2>Usuarios Registrados</h2>
    <table>
      <thead><tr><th>Usuario</th><th>Nombre</th><th>Rol</th><th>Estado</th><th>Último acceso</th><th>Acciones</th></tr></thead>
      <tbody id="userList"></tbody>
    </table>
  </div>

  <div class="card">
    <h2>Últimos Cambios</h2>
    <table>
      <thead><tr><th>Fecha</th><th>Usuario</th><th>Sección</th><th>Detalle</th></tr></thead>
      <tbody id="changelogList"></tbody>
    </table>
  </div>
</div>

<script>
function showMsg(text, ok) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg show ' + (ok ? 'msg-ok' : 'msg-err');
  setTimeout(() => el.classList.remove('show'), 4000);
}

async function loadUsers() {
  const res = await fetch('/api/users');
  if (res.status === 401) return window.location.href = '/login';
  if (res.status === 403) return document.body.innerHTML = '<p style="padding:40px;color:#f87171">Solo administradores pueden acceder.</p>';
  const users = await res.json();
  document.getElementById('userList').innerHTML = users.map(u => `<tr>
    <td style="font-family:'DM Mono',monospace">${u.username}</td>
    <td>${u.display_name}</td>
    <td><span class="badge badge-${u.role}">${u.role}</span></td>
    <td>${u.active ? '<span style="color:#34d399">Activo</span>' : '<span class="badge badge-inactive">Inactivo</span>'}</td>
    <td style="font-size:10px;color:#6a6a7a">${u.last_login ? new Date(u.last_login).toLocaleString('es-ES') : 'Nunca'}</td>
    <td>
      <button class="btn btn-sm ${u.active ? 'btn-red' : 'btn-green'}" onclick="toggleUser(${u.id},${!u.active})">${u.active ? 'Desactivar' : 'Activar'}</button>
      <button class="btn btn-sm btn-blue" onclick="resetPassword(${u.id},'${u.username}')">Reset pass</button>
    </td>
  </tr>`).join('');
}

async function loadChangelog() {
  const res = await fetch('/api/changelog?limit=20');
  const rows = await res.json();
  document.getElementById('changelogList').innerHTML = rows.map(r => `<tr>
    <td style="font-size:10px;color:#6a6a7a">${new Date(r.changed_at).toLocaleString('es-ES')}</td>
    <td>${r.changed_by}</td>
    <td style="font-family:'DM Mono',monospace;font-size:10px">${r.section}</td>
    <td style="font-size:10px;color:#a0a0b0">${r.new_value || ''}</td>
  </tr>`).join('');
}

async function createUser() {
  const username = document.getElementById('newUser').value.trim();
  const displayName = document.getElementById('newName').value.trim();
  const password = document.getElementById('newPass').value;
  const role = document.getElementById('newRole').value;

  if (!username || !displayName || !password) return showMsg('Rellena todos los campos', false);

  const res = await fetch('/api/users', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username, displayName, password, role })
  });
  const json = await res.json();
  if (json.success) {
    showMsg(`Usuario "${username}" creado correctamente`, true);
    document.getElementById('newUser').value = '';
    document.getElementById('newName').value = '';
    document.getElementById('newPass').value = '';
    loadUsers();
  } else {
    showMsg(json.error || 'Error al crear usuario', false);
  }
}

async function toggleUser(id, active) {
  await fetch(`/api/users/${id}`, {
    method: 'PUT', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ active })
  });
  loadUsers();
}

async function resetPassword(id, username) {
  const pwd = prompt(`Nueva contraseña para ${username}:`);
  if (!pwd || pwd.length < 6) return alert('Mínimo 6 caracteres');
  const res = await fetch(`/api/users/${id}`, {
    method: 'PUT', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ password: pwd })
  });
  if ((await res.json()).success) showMsg(`Contraseña de ${username} actualizada`, true);
}

loadUsers();
loadChangelog();
</script>
</body>
</html>
