<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IWAKY — Acceso Panel Financiero</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#08081a;color:#e0e0f0;min-height:100vh;display:flex;align-items:center;justify-content:center}
.login-box{width:100%;max-width:400px;padding:24px}
.logo{display:flex;align-items:center;gap:12px;margin-bottom:40px;justify-content:center}
.logo-icon{width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,#4f46e5,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;font-family:'Playfair Display',serif;color:#fff}
.logo h1{font-size:24px;font-weight:700;font-family:'Playfair Display',serif;color:#f0f0ff}
.logo p{font-size:11px;color:#6a6a7a;margin-top:2px}
.card{background:linear-gradient(135deg,#0d0d18,#12122a);border:1px solid #1f1f35;border-radius:16px;padding:32px}
.card h2{font-size:16px;font-weight:600;color:#e0e0f0;margin-bottom:4px;font-family:'Playfair Display',serif}
.card .sub{font-size:12px;color:#6a6a7a;margin-bottom:24px}
label{display:block;font-size:11px;color:#8a8a9a;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
input[type="text"],input[type="password"]{display:block;width:100%;padding:12px 16px;background:#1c2333;border:1px solid #2a2a45;border-radius:8px;color:#e0e0f0;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color .2s}
input:focus{border-color:#4f46e5}
.field{margin-bottom:18px}
.btn{display:block;width:100%;padding:12px;background:linear-gradient(135deg,#4f46e5,#8b5cf6);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:opacity .2s}
.btn:hover{opacity:.9}
.btn:disabled{opacity:.5;cursor:not-allowed}
.error{background:#1a1015;border:1px solid #ef444440;border-radius:8px;padding:10px 14px;font-size:12px;color:#f87171;margin-bottom:16px;display:none}
.error.show{display:block}
.footer{text-align:center;margin-top:24px;font-size:10px;color:#4a4a5a}
</style>
</head>
<body>
<div class="login-box">
  <div class="logo">
    <div class="logo-icon">I</div>
    <div>
      <h1>IWAKY</h1>
      <p>Panel Financiero 2026</p>
    </div>
  </div>
  <div class="card">
    <h2>Acceso al Panel</h2>
    <div class="sub">Introduce tus credenciales para acceder</div>
    <div class="error" id="error"></div>
    <form id="loginForm" onsubmit="doLogin(event)">
      <div class="field">
        <label>Usuario</label>
        <input type="text" id="username" name="username" autocomplete="username" required autofocus>
      </div>
      <div class="field">
        <label>Contraseña</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn" id="submitBtn">Entrar</button>
    </form>
  </div>
  <div class="footer">IWAKY Servicios Técnicos S.L. · Acceso restringido</div>
</div>
<script>
async function doLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  const errEl = document.getElementById('error');
  btn.disabled = true;
  btn.textContent = 'Entrando...';
  errEl.classList.remove('show');

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: document.getElementById('username').value.trim(),
        password: document.getElementById('password').value,
      }),
    });
    const json = await res.json();
    if (json.success) {
      window.location.href = '/';
    } else {
      errEl.textContent = json.error || 'Error de acceso';
      errEl.classList.add('show');
    }
  } catch (err) {
    errEl.textContent = 'Error de conexión con el servidor';
    errEl.classList.add('show');
  }
  btn.disabled = false;
  btn.textContent = 'Entrar';
}
</script>
</body>
</html>
