*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{

body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;line-height:1.5}

.header{background:linear-gradient(135deg,var(--bg-header),#10102a,var(--bg-header));border-bottom:1px solid #1a1a30;padding:24px 32px 16px;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
.header-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px}
.logo-group{display:flex;align-items:center;gap:12px}
.logo-icon{width:42px;height:42px;border-radius:10px;background:linear-gradient(135deg,var(--blue),var(--purple));display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;font-family:'Playfair Display',serif;color:#fff}
.logo-text h1{font-size:22px;font-weight:700;font-family:'Playfair Display',serif;color:#f0f0ff}
.logo-text p{font-size:11px;color:var(--t3);margin-top:2px}
.status-badge{background:#0f0f1f;border:1px solid var(--border2);border-radius:8px;padding:8px 14px;font-size:11px;color:#8a8a9a;font-family:'DM Mono',monospace}

.tabs{display:flex;gap:2px;background:#0a0a18;border-radius:8px;padding:3px}
.tab-btn{flex:1;padding:9px 14px;background:transparent;border:1px solid transparent;border-radius:6px;color:#5a5a6a;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;white-space:nowrap}
.tab-btn:hover{color:#8a8a9a}
.tab-btn.active{background:linear-gradient(135deg,#1a1a35,#20203a);border-color:var(--border2);color:#e0e0ff;font-weight:600}

.content{padding:24px 32px;max-width:1440px;margin:0 auto}
.tab-panel{display:none}.tab-panel.active{display:block}

.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:20px}
.grid-21{display:grid;grid-template-columns:2fr 1fr;gap:14px;margin-bottom:20px}
@media(max-width:900px){.grid-4,.grid-3,.grid-2,.grid-21{grid-template-columns:1fr}}

.kpi{background:linear-gradient(135deg,#0f0f1a,#161628);border:1px solid var(--border);border-radius:12px;padding:18px 20px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--kpi-accent,var(--blue))}
.kpi-label{font-size:10px;color:#7a7a8a;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px}
.kpi-value{font-size:24px;font-weight:700;color:#f0f0ff;font-family:'DM Mono',monospace;line-height:1}
.kpi-sub{font-size:11px;margin-top:6px}
.kpi-icon{position:absolute;top:14px;right:16px;font-size:22px;opacity:.25}

.card{background:linear-gradient(135deg,var(--bg-card),var(--bg-alt));border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:20px}
.card h2{font-size:16px;font-weight:600;color:var(--t1);font-family:'Playfair Display',serif;margin-bottom:4px}
.card .sub{font-size:11px;color:var(--t3);margin-bottom:16px}

.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:11px;font-family:'DM Mono',monospace}
thead th{text-align:right;padding:8px;color:var(--t3);font-weight:500;font-family:'DM Sans',sans-serif;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg-card);z-index:1}

tbody td{text-align:right;padding:8px;color:var(--t2);border-bottom:1px solid #0f0f22}
tbody td:first-child{text-align:left;color:#c0c0d0;font-family:'DM Sans',sans-serif}
tr.total-row{border-top:2px solid var(--border2)}
tr.total-row td{color:var(--t1);font-weight:600;padding:10px 8px}
td.col-total{color:var(--blue);font-weight:700}
tr.section-row td{background:var(--bg-section);color:var(--blue);font-weight:600;font-family:'DM Sans',sans-serif;text-transform:uppercase;font-size:11px;letter-spacing:1px}
tr.subtotal-row{background:var(--bg-total)}
tr.subtotal-row td{font-weight:600}
tr.negative td{color:var(--rose)}
tr.highlight-row{background:#0a1520}
tr.highlight-row td{color:var(--emerald);font-weight:700;font-size:12px}

td.editable{position:relative;cursor:pointer}
td.editable:hover{background:var(--bg-input)}
.edit-input{background:var(--bg-input);border:1px solid var(--blue);color:#58a6ff;font-family:'DM Mono',monospace;font-size:11px;padding:4px 6px;width:90px;text-align:right;border-radius:4px;outline:none}

.bar-chart{display:flex;align-items:flex-end;gap:4px;height:140px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.bar-val{font-size:8px;color:#8a8a9a;font-family:'DM Mono',monospace}
.bar-fill{width:100%;border-radius:3px;transition:height .5s;min-height:2px}
.bar-label{font-size:9px;color:var(--t3)}

.donut-wrap{display:flex;flex-direction:column;align-items:center}
.donut-legend{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:8px}
.legend-item{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--t2)}
.legend-dot{width:8px;height:8px;border-radius:2px}

.hbar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.hbar-label{width:150px;font-size:11px;color:#c0c0d0;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hbar-track{flex:1;height:18px;background:#1a1a2e;border-radius:4px;overflow:hidden}
.hbar-fill{height:100%;border-radius:4px;transition:width .5s}
.hbar-value{width:80px;font-size:11px;color:var(--t1);font-family:'DM Mono',monospace;text-align:right}

.dept-card{background:linear-gradient(135deg,var(--bg-card),var(--bg-alt));border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:16px;border-left:3px solid var(--dept-color,var(--blue))}

.dept-budget-val{font-size:18px;font-weight:700;font-family:'DM Mono',monospace}
.dept-metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:14px}

.dept-metric-label{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:1px}
.dept-metric-val{font-size:16px;font-weight:600;color:var(--t1);font-family:'DM Mono',monospace}

let D=JSON.parse(JSON.stringify(DEFAULT_DATA));
let currentUser = null;
let lastSync = null;
let syncInterval = null;

// ═══ API ═══
const API = '/api';

async function checkAuth() {
  try {
    const res = await fetch(API + '/auth/me');
    if (res.status === 401) { window.location.href = '/login'; return false; }
    const json = await res.json();
    currentUser = json.user;
    updateUserBadge();
    return true;
  } catch(e) { window.location.href = '/login'; return false; }
}

function updateUserBadge() {
  const el = document.getElementById('userBadge');
  if (el && currentUser) el.textContent = currentUser.display_name + ' (' + currentUser.role + ')';
}

async function loadFromServer() {
  try {
    const res = await fetch(API + '/data');
    if (res.status === 401) { window.location.href = '/login'; return; }
    const json = await res.json();
    D = json.data;
    lastSync = json.updatedAt;
    updateSyncStatus(json.updatedBy, json.updatedAt);
    renderCurrent();
  } catch(e) {
    console.warn('Error cargando datos:', e);
  }
}

async function save() {
  // Save to server
  try {
    const res = await fetch(API + '/data', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ data: D })
    });
    if (res.status === 401) { window.location.href = '/login'; return; }
    const json = await res.json();
    if (json.success) {
      lastSync = json.updatedAt;
      updateSyncStatus(json.updatedBy, json.updatedAt);
    }
  } catch(e) { console.warn('Error guardando:', e); }

  const el = document.getElementById('saveInd');
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1500);
}

async function resetData() {
  if (!currentUser || currentUser.role !== 'admin') {
    alert('Solo administradores pueden resetear los datos.');
    return;
  }
  if (!confirm('¿Resetear todos los datos? Esto afecta a TODO EL EQUIPO.')) return;
  try {
    await fetch(API + '/reset', { method: 'POST', headers: { 'Content-Type': 'application/json' } });
    D = JSON.parse(JSON.stringify(DEFAULT_DATA));
    renderCurrent();
  } catch(e) { console.warn('Error reset:', e); }
}

function updateSyncStatus(user, time) {
  const el = document.getElementById('syncStatus');
  if (el && time) {
    const d = new Date(time);
    const t = d.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
    el.innerHTML = '<span style="color:#10b981">●</span> Sync · ' + (user||'') + ' · ' + t;
  }
}

function startAutoSync() {
  syncInterval = setInterval(async () => {
    try {
      const res = await fetch(API + '/data');
      if (res.status === 401) { window.location.href = '/login'; return; }
      const json = await res.json();
      if (json.updatedAt !== lastSync) {
        D = json.data;
        lastSync = json.updatedAt;
        updateSyncStatus(json.updatedBy, json.updatedAt);
        renderCurrent();
      }
    } catch(e) {}
  }, 15000);
}

async function doLogout() {
  await fetch(API + '/auth/logout', { method: 'POST' });
  window.location.href = '/login';
}

// ═══ COMPUTE ═══
function compute(){
  const R=D.revenue, M=D.margins;

  // Facturación por canal (lo que se factura)
  const mFact=MONTHS.map((_,i)=>R.ventasValencia[i]+R.accesorios[i]+R.reparaciones[i]+R.b2b[i]+R.online[i]);
  const tFact=mFact.reduce((a,b)=>a+b,0);

  // Margen bruto tienda (23% sobre tienda+accesorios+reparaciones)
  const mMargenTienda=MONTHS.map((_,i)=>(R.ventasValencia[i]+R.accesorios[i]+R.reparaciones[i])*M.tienda);
  const tMargenTienda=mMargenTienda.reduce((a,b)=>a+b,0);

  // Margen bruto B2B+Online (7%)
  const mMargenMayor=MONTHS.map((_,i)=>(R.b2b[i]+R.online[i])*M.mayorOnline);
  const tMargenMayor=mMargenMayor.reduce((a,b)=>a+b,0);

  // Margen bruto total
  const mMargenBruto=MONTHS.map((_,i)=>mMargenTienda[i]+mMargenMayor[i]);
  const tMargenBruto=tMargenTienda+tMargenMayor;
  const pctMargenBruto=tFact>0?tMargenBruto/tFact:0;

  // IVA mensualizado (reparto trimestral en último mes del Q)
  const mIVA=MONTHS.map((_,i)=>{
    const q=Q_MAP[i];
    const lastMonthOfQ=[2,5,8,11];
    return lastMonthOfQ.includes(i)?D.iva[q]:0;
  });
  const tIVA=D.iva.reduce((a,b)=>a+b,0);

  // Gastos operativos
  const mOpex=MONTHS.map((_,i)=>D.gastos.reduce((s,g)=>s+g.values[i],0));
  const tOpex=mOpex.reduce((a,b)=>a+b,0);

  // Nóminas
  const mPayroll=MONTHS.map((_,i)=>Object.values(D.nominas).reduce((s,dept)=>s+dept.employees.reduce((es,emp)=>es+emp.monthly[i],0),0));
  const tPayroll=mPayroll.reduce((a,b)=>a+b,0);

  // Total gastos (opex + nóminas)
  const mGastos=MONTHS.map((_,i)=>mOpex[i]+mPayroll[i]);
  const tGastos=tOpex+tPayroll;

  // EBITDA = Margen Bruto - Gastos Explotación - Nóminas
  const mEBITDA=MONTHS.map((_,i)=>mMargenBruto[i]-mGastos[i]);
  const tEBITDA=tMargenBruto-tGastos;

  // Resultado después de IVA
  const mResultado=MONTHS.map((_,i)=>mEBITDA[i]-mIVA[i]);
  const tResultado=tEBITDA-tIVA;

  // Revenue channels
  const revByChannel=[
    {name:"Tienda Valencia",value:R.ventasValencia.reduce((a,b)=>a+b,0),color:"var(--blue)"},
    {name:"B2B",value:R.b2b.reduce((a,b)=>a+b,0),color:"var(--cyan)"},
    {name:"Online",value:R.online.reduce((a,b)=>a+b,0),color:"var(--purple)"},
    {name:"Accesorios",value:R.accesorios.reduce((a,b)=>a+b,0),color:"var(--yellow)"},
  ];

  // Expense categories
  const catMap={};
  D.gastos.forEach(g=>{catMap[g.cat]=(catMap[g.cat]||0)+g.values.reduce((a,b)=>a+b,0)});
  const catC={local:"#ef4444",financiero:"#f59e0b",operativo:"#06b6d4",marketing:"#8b5cf6",personal:"#10b981"};
  const catL={local:"Local/Espacio",financiero:"Financieros",operativo:"Operativos",marketing:"Marketing",personal:"Personal/Salud"};
  const expByCat=Object.entries(catMap).map(([k,v])=>({name:catL[k]||k,value:v,color:catC[k]||"#666"}));

  const deptPayroll={};
  Object.entries(D.nominas).forEach(([k,dept])=>{
    deptPayroll[k]={name:dept.name,annual:dept.employees.reduce((s,e)=>s+e.monthly.reduce((a,b)=>a+b,0),0)};
  });

  return{mFact,tFact,mMargenTienda,tMargenTienda,mMargenMayor,tMargenMayor,
    mMargenBruto,tMargenBruto,pctMargenBruto,mIVA,tIVA,mOpex,tOpex,
    mPayroll,tPayroll,mGastos,tGastos,mEBITDA,tEBITDA,mResultado,tResultado,
    revByChannel,expByCat,deptPayroll};
}

}

// ═══ INLINE EDITING ═══
function editRev(td,key,mi){
  if(td.querySelector('input'))return;
  const cur=D.revenue[key][mi];
  td.innerHTML=`<input class="edit-input" type="number" value="${cur}">`;
  const inp=td.querySelector('input');inp.focus();inp.select();
  const fin=()=>{const v=parseFloat(inp.value);if(!isNaN(v)){D.revenue[key][mi]=v;save()}renderCurrent()};
  inp.onblur=fin;inp.onkeydown=e=>{if(e.key==='Enter')fin();if(e.key==='Escape')renderCurrent()};

        <div class="bar-chart" style="height:160px">
          ${allYears.map((yr,i)=>{const v=allTotals[i];const h=v>0?Math.max((v/maxYearly)*130,4):4;const is26=yr===2026;
          return `<div class="bar-col"><div class="bar-val" style="${is26?'color:var(--emerald);font-weight:600':''};font-size:9px">${v>0?fmtK(v):'—'}</div><div class="bar-fill" style="height:${h}px;background:${is26?'linear-gradient(to top,#4f46e5,#8b5cf6)':'linear-gradient(to top,#2a2a4a,#4a4a6a)'}"></div><div class="bar-label" style="${is26?'color:var(--blue);font-weight:700;font-size:11px':''}">${yr}</div></div>`;}).join('')}
        </div>
        ${bestYear?`<div style="margin-top:8px;font-size:10px;color:var(--t3);text-align:center">Mejor: <strong style="color:var(--yellow)">${bestYear}</strong> (${fmt(bestYearVal)})</div>`:''}
      </div>
      <div class="card">
        <h2>Evolución Beneficio Neto</h2>
        <div class="bar-chart" style="height:160px">
          ${allYears.map((yr,i)=>{const v=allBeneficio[i];const h=v!==0?Math.max((Math.abs(v)/maxBenef)*130,4):4;const is26=yr===2026;
          return `<div class="bar-col"><div class="bar-val ${v>=0?'pval-pos':'pval-neg'}" style="font-size:9px">${v!==0?fmtK(v):'—'}</div><div class="bar-fill ${v>=0?'pbar-pos':'pbar-neg'}" style="height:${h}px;${is26?'opacity:0.7;border:1px dashed var(--emerald)':''}"></div><div class="bar-label" style="${is26?'color:var(--green);font-weight:700;font-size:11px':''}">${yr}${is26?' (est)':''}</div></div>`;}).join('')}
        </div>
      </div>
    </div>

    <!-- EVOLUCIÓN POR LÍNEA -->
    <div class="card">
      <h2>Evolución por Línea de Negocio</h2>
      ${LINEAS.map(l=>{const vals=[...años.map((_,yi)=>yearTotal(l.key,yi)),proy26[l.key]];const mx=Math.max(...vals.filter(v=>v>0),1);const best=Math.max(...vals.slice(0,-1).filter(v=>v>0));const pr=proy26[l.key];
        return `<div style="margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid #0f0f22">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
            <div style="width:10px;height:10px;border-radius:2px;background:${l.color}"></div>
            <span style="font-size:12px;color:var(--t1);font-weight:500">${l.name}</span>
            <span style="font-size:10px;color:var(--t3)">(${pct(l.margin)})</span>
            <span style="font-size:11px;color:var(--t3);margin-left:auto">Proy: <strong style="color:${l.color}">${pr>0?fmt(pr):'—'}</strong></span>
            ${pr>0&&best>0?`<span style="font-size:10px;color:${pr>=best?'var(--emerald)':'var(--rose)'}"> ${pr>=best?'✓ Supera mejor año':'△ '+fmt(best-pr)+' para mejor'}</span>`:''}
          </div>
          <div style="display:flex;align-items:flex-end;gap:5px;height:40px">
            ${allYears.map((yr,i)=>{const v=vals[i];const h=v>0?Math.max((v/mx)*35,2):2;
            return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px"><div style="font-size:7px;color:var(--t3)">${v>0?fmtK(v):''}</div><div style="width:100%;height:${h}px;border-radius:2px;background:${yr===2026?l.color:'#3a3a5a'};opacity:${yr===2026?1:0.5}"></div><div style="font-size:7px;color:var(--t4)">${yr}</div></div>`;}).join('')}
          </div>
        </div>`;}).join('')}
    </div>

    <!-- PROYECCIÓN MENSUAL 2026 -->
    <div class="card" style="border:1px solid #4f46e540">
      <h2 style="color:var(--blue)">Proyección Mensual 2026</h2>
      <div class="sub">Define mes a mes la facturación proyectada por línea</div>
      <div class="table-wrap"><table>
        <thead><tr><th>Línea</th>${MONTHS.map(m=>`<th>${m}</th>`).join('')}<th style="color:var(--blue)">TOTAL</th><th>Margen €</th></tr></thead>
        <tbody>
          ${LINEAS.map(l=>`<tr><td><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:${l.color};margin-right:6px"></span>${l.name} <span style="color:var(--t4);font-size:9px">(${pct(l.margin)})</span></td>
            ${P[l.key].map((v,mi)=>`<td class="editable" style="color:#58a6ff" onclick="editProy(this,'${l.key}',${mi})">${v>0?fmt(v):'<span style=color:var(--t4)>—</span>'}</td>`).join('')}
            <td class="col-total">${proy26[l.key]>0?fmt(proy26[l.key]):'—'}</td>
            <td style="color:var(--emerald)">${proy26[l.key]>0?fmt(proy26[l.key]*l.margin):'—'}</td></tr>`).join('')}
          <tr class="total-row"><td>TOTAL</td>${mTotalProy.map(v=>`<td>${v>0?fmt(v):'—'}</td>`).join('')}<td class="col-total" style="font-size:13px">${totalProy>0?fmt(totalProy):'—'}</td><td style="color:var(--emerald);font-weight:700">${tMargenProy>0?fmt(tMargenProy):'—'}</td></tr>
        </tbody>
      </table></div>
    </div>

    ${totalProy>0?`<div class="card"><h2>Facturación Mensual Proyectada 2026</h2>
      <div class="bar-chart" style="height:140px">
        ${MONTHS.map((m,i)=>{const v=mTotalProy[i];const mx=Math.max(...mTotalProy,1);const h=v>0?Math.max((v/mx)*110,2):2;
        return `<div class="bar-col"><div class="bar-val" style="font-size:9px">${v>0?fmtK(v):'—'}</div><div class="bar-fill" style="height:${h}px;background:linear-gradient(to top,#4f46e5,#8b5cf6)"></div><div class="bar-label">${m}</div></div>`;}).join('')}
      </div></div>`:''}

    <!-- OBJETIVOS -->
    <div class="card">
      <h2>Objetivos 2026 por Línea</h2>
      <div class="sub">Define un objetivo anual. La barra muestra cuánto cubre la proyección. Botón "= Mejor año" copia el récord histórico.</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;margin-top:12px">
        ${LINEAS.map(l=>{const obj=P.objetivo2026[l.key]||0;const actual=proy26[l.key];const pctD=obj>0?actual/obj:0;const bestL=Math.max(...años.map((_,yi)=>yearTotal(l.key,yi)));
          return `<div style="background:#0a0a18;border-radius:10px;padding:16px;border:1px solid var(--border)">
            <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px"><div style="width:10px;height:10px;border-radius:2px;background:${l.color}"></div><span style="font-size:12px;color:var(--t1);font-weight:500">${l.name}</span></div>
            ${bestL>0?`<div style="font-size:10px;color:var(--t3);margin-bottom:6px">Mejor año: <strong style="color:var(--yellow)">${fmt(bestL)}</strong></div>`:''}
            <div style="margin-bottom:8px"><label style="font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:1px">Objetivo 2026</label>
              <input type="number" value="${obj||''}" placeholder="0" style="display:block;width:100%;margin-top:4px;background:var(--bg-input);border:1px solid ${l.color};color:#58a6ff;font-family:'DM Mono',monospace;font-size:14px;padding:8px 12px;border-radius:6px;text-align:right" onchange="setObjetivo('${l.key}',this.value)"></div>
            ${obj>0?`<div style="display:flex;justify-content:space-between;font-size:10px;color:var(--t3);margin-bottom:4px"><span>Proyectado: ${fmt(actual)}</span><span style="color:${pctD>=1?'var(--emerald)':pctD>=0.7?'var(--yellow)':'var(--rose)'}">${pct(pctD)}</span></div>
              <div style="height:8px;background:#1a1a2e;border-radius:4px;overflow:hidden"><div style="height:100%;width:${Math.min(pctD*100,100)}%;background:${pctD>=1?'var(--green)':pctD>=0.7?'var(--yellow)':'var(--red)'};border-radius:4px"></div></div>
              <div style="margin-top:8px;display:flex;gap:6px">
                <button style="flex:1;background:none;border:1px solid var(--border2);color:var(--t2);font-size:10px;padding:5px 8px;border-radius:4px;cursor:pointer;font-family:'DM Sans',sans-serif" onclick="distribuirObjetivo('${l.key}')">Repartir 12 meses</button>
                ${bestL>0?`<button style="flex:1;background:none;border:1px solid #f59e0b40;color:var(--yellow);font-size:10px;padding:5px 8px;border-radius:4px;cursor:pointer;font-family:'DM Sans',sans-serif" onclick="setObjetivo('${l.key}',${bestL});renderCurrent()">= Mejor año</button>`:''}
              </div>`:'<div style="font-size:10px;color:var(--t4);margin-top:4px">Define un objetivo para ver progreso</div>'}
          </div>`;}).join('')}
      </div>
    </div>

    ${totalProy>0?`<div class="card" style="border:1px solid #10b98140;background:linear-gradient(135deg,#0a1510,#0d1a15)">
      <h2 style="color:var(--emerald)">Aplicar Proyección al Presupuesto</h2>
      <div class="sub">Copia la proyección al presupuesto base del P&L</div>
      <button style="margin-top:8px;background:linear-gradient(135deg,#10b981,#059669);color:#fff;border:none;padding:10px 24px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif" onclick="aplicarProyeccion()">✓ Aplicar proyección al P&L</button>
    </div>`:''}
  `;
  }catch(err){
    console.error('Error renderProyeccion:',err);
    el.innerHTML='<div class="warn">Error al renderizar. Pulsa <strong>Reset</strong> arriba a la derecha para limpiar datos antiguos y volver a empezar.<br><br><code style="font-size:10px;color:var(--t4)">'+err.message+'</code></div>';
  }
}

function renderYearDetail(year,yi,LINEAS){
  return `<div style="background:#0a0a14;border:1px solid var(--border);border-radius:10px;padding:16px;margin-top:8px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <h3 style="font-size:14px;color:var(--t1);font-family:'Playfair Display',serif;margin:0">Detalle Mensual — ${year}</h3>
      <button onclick="selectYear(null)" style="background:none;border:1px solid var(--border2);color:var(--t3);font-size:10px;padding:4px 10px;border-radius:4px;cursor:pointer">✕ Cerrar</button>
    </div>
    <div class="table-wrap"><table>
      <thead><tr><th>Canal</th>${MONTHS.map(m=>`<th>${m}</th>`).join('')}<th style="color:var(--blue)">TOTAL</th></tr></thead>
      <tbody>
        ${LINEAS.map(l=>{const m=D.historico.lineas[l.key].mensual[yi];const t=m.reduce((a,b)=>a+b,0);
          return `<tr><td><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:${l.color};margin-right:6px"></span>${l.name}</td>
            ${m.map((v,mi)=>`<td class="editable" style="color:#58a6ff" onclick="editHist(this,'${l.key}',${yi},${mi})">${v>0?fmt(v):'<span style=color:var(--t4)>—</span>'}</td>`).join('')}
            <td class="col-total">${t>0?fmt(t):'—'}</td></tr>`;}).join('')}
        <tr class="total-row"><td>TOTAL</td>${MONTHS.map((_,mi)=>{const t=LINEAS.reduce((s,l)=>s+D.historico.lineas[l.key].mensual[yi][mi],0);return `<td>${t>0?fmt(t):'—'}</td>`}).join('')}
          <td class="col-total">${fmt(LINEAS.reduce((s,l)=>s+D.historico.lineas[l.key].mensual[yi].reduce((a,b)=>a+b,0),0))}</td></tr>
      </tbody>
    </table></div>
  </div>`;
}

function selectYear(yr){document.getElementById('tab-proyeccion').dataset.selYear=yr===null?'':yr;renderCurrent()}

function editHist(td,key,yi,mi){
  if(td.querySelector('input'))return;
  const cur=D.historico.lineas[key].mensual[yi][mi];
  td.innerHTML=`<input class="edit-input" type="number" value="${cur||''}">`;
  const inp=td.querySelector('input');inp.focus();inp.select();
  const fin=()=>{const v=parseFloat(inp.value)||0;D.historico.lineas[key].mensual[yi][mi]=v;save();renderCurrent()};
  inp.onblur=fin;inp.onkeydown=e=>{if(e.key==='Enter')fin();if(e.key==='Escape')renderCurrent()};
}
function editProy(td,key,mi){
  if(td.querySelector('input'))return;
  const cur=D.proyeccion2026[key][mi];
  td.innerHTML=`<input class="edit-input" type="number" value="${cur||''}">`;
  const inp=td.querySelector('input');inp.focus();inp.select();
  const fin=()=>{const v=parseFloat(inp.value)||0;D.proyeccion2026[key][mi]=v;save();renderCurrent()};
  inp.onblur=fin;inp.onkeydown=e=>{if(e.key==='Enter')fin();if(e.key==='Escape')renderCurrent()};
}
function setObjetivo(key,val){D.proyeccion2026.objetivo2026[key]=parseFloat(val)||0;save();renderCurrent()}
function distribuirObjetivo(key){
  const obj=D.proyeccion2026.objetivo2026[key];if(!obj||obj<=0)return;
  const w=[0.075,0.07,0.08,0.08,0.085,0.08,0.075,0.065,0.09,0.095,0.1,0.105];const tw=w.reduce((a,b)=>a+b,0);
  D.proyeccion2026[key]=w.map(x=>Math.round(obj*x/tw));
  D.proyeccion2026[key][11]+=obj-D.proyeccion2026[key].reduce((a,b)=>a+b,0);
  save();renderCurrent();
}
function aplicarProyeccion(){
  if(!confirm('¿Copiar la proyección 2026 al presupuesto base?\nSobreescribirá los ingresos del P&L.'))return;
  const m={tiendaVLC:'ventasValencia',b2b:'b2b',online:'online',accesorios:'accesorios',reparaciones:'reparaciones'};
  Object.entries(m).forEach(([pk,rk])=>{D.revenue[rk]=D.proyeccion2026[pk].map(v=>v)});
  save();alert('✓ Proyección aplicada. Ve a Resumen P&L.');renderCurrent();
}

// ═══ INIT ═══
// ═══ INIT ═══
(async function init() {
  const ok = await checkAuth();
  if (!ok) return;
  await loadFromServer();
  renderTab('resumen');
  startAutoSync();
})();
</script>
